{% extends 'base.html' %}
{% block title %}Timeline{% endblock %}

{% block content %}
<section class="section">
    <h2>Timeline</h2>

    <!-- Form -->
    <div class="timeline-form">
        <form action="/api/timeline_post" method="POST">
            <div class="form-group">
                <label>Name</label>
                <input type="text" name="name" placeholder="Your name" required />
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="Your email" required />
            </div>
            <div class="form-group">
                <label>Message</label>
                <textarea name="content" placeholder="What's on your mind?" required></textarea>
            </div>
            <button type="submit">Post</button>
        </form>
    </div>

    <!-- Timeline Posts -->
    <div class="timeline-posts">
        {% for post in timeline_posts %}
        <div class="timeline-card">
            <div class="timeline-card-header">
                <span class="timeline-name">{{ post.name }}</span>
                <span class="timeline-date">{{ post.created_at.strftime('%B %d, %Y') }}</span>
            </div>
            <p class="timeline-email">{{ post.email }}</p>
            <p class="timeline-content">{{ post.content }}</p>
        </div>
        {% endfor %}
    </div>
</section>
{% endblock %}
